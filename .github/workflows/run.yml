name: Kirim Jadwal Otomatis

on:
  schedule:
    # Menggunakan waktu UTC. 00:00 UTC = 07:00 WIB pagi
    - cron: '0 0 * * *'
  workflow_dispatch: # Tombol rahasia agar bisa kita tes jalankan manual

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install library
        run: pip install requests

      - name: Jalankan Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python main.py
